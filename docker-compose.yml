# Local development stack: full platform + dependencies + observability.
# Bring up with `make up`. App services hot-reload via mounted source.

x-app-env: &app-env
  ENVIRONMENT: local
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: platform
  POSTGRES_PASSWORD: platform
  POSTGRES_DB: platform
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  EMBEDDING_PROVIDER: local
  JWT_SECRET_KEY: local-dev-secret
  LOG_JSON: "false"

x-app-build: &app-build
  build:
    context: .
    dockerfile: docker/Dockerfile
    args:
      PREFETCH_MODEL: "false"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  migrate:
    <<: *app-build
    environment: *app-env
    depends_on:
      postgres: {condition: service_healthy}
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  gateway:
    <<: *app-build
    environment: {<<: *app-env, SERVICE_NAME: gateway}
    command: ["uvicorn", "services.gateway.app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      migrate: {condition: service_completed_successfully}

  ingestion:
    <<: *app-build
    environment: {<<: *app-env, SERVICE_NAME: ingestion}
    command: ["uvicorn", "services.ingestion.app.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    volumes: [".:/app"]
    ports: ["8001:8001"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  retrieval:
    <<: *app-build
    environment: {<<: *app-env, SERVICE_NAME: retrieval}
    command: ["uvicorn", "services.retrieval.app.main:app", "--host", "0.0.0.0", "--port", "8002", "--reload"]
    volumes: [".:/app"]
    ports: ["8002:8002"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  worker:
    <<: *app-build
    environment: {<<: *app-env, SERVICE_NAME: worker}
    command: ["celery", "-A", "workers.celery_app.celery_app", "worker", "-Q", "ingest,embed", "--concurrency", "2", "-l", "info"]
    volumes: [".:/app"]
    depends_on:
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}

  beat:
    <<: *app-build
    environment: {<<: *app-env, SERVICE_NAME: beat}
    command: ["celery", "-A", "workers.celery_app.celery_app", "beat", "-l", "info"]
    volumes: [".:/app"]
    depends_on:
      redis: {condition: service_healthy}

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes: ["./observability/otel-collector.yaml:/etc/otel/config.yaml:ro"]
    ports: ["4317:4317", "4318:4318"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  pgdata:
  miniodata:
