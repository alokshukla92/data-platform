# Local-cluster ArgoCD Application.
#
# Unlike the dev/staging/production Applications generated by the gitops repo's
# ApplicationSet (which pull ghcr.io images), this one targets a kind cluster:
# it renders the Helm chart with values-local.yaml, which uses the locally-built
# `data-platform:dev` image (loaded via `kind load`) with pullPolicy IfNotPresent.
#
# In-cluster Postgres/Redis are provisioned separately (deploy/kind/infra-local.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-platform-local
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/alokshukla92/data-platform.git
    targetRevision: main
    path: deploy/helm/data-platform
    helm:
      valueFiles:
        - values-local.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: data-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
