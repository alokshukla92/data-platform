{{- if .Values.networkPolicy.enabled }}
# Default-deny ingress, then explicitly allow the traffic the platform needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-deny
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-ingress-to-services
spec:
  podSelector:
    matchExpressions:
      - { key: app.kubernetes.io/name, operator: In, values: ["gateway", "ingestion", "retrieval"] }
  policyTypes: [Ingress]
  ingress:
    # Allow traffic from the ingress controller namespace and from within the platform.
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: ingress-nginx }
        - podSelector:
            matchLabels: { app.kubernetes.io/part-of: data-platform }
      ports:
        - { protocol: TCP, port: http }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-allow-metrics-scrape
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/part-of: data-platform }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { monitoring: "true" }
      ports:
        - { protocol: TCP, port: http }
{{- end }}
