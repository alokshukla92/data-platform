# Dev: small footprint, autoscaling on, rolling deploys.
global:
  environment: dev
  imageTag: latest

defaults:
  replicas: 2
  hpa: { enabled: true, minReplicas: 2, maxReplicas: 5, targetCPUUtilizationPercentage: 75, targetMemoryUtilizationPercentage: 80 }

workers:
  ingest: { queues: "ingest", concurrency: 4, replicas: 2, hpa: { enabled: true, minReplicas: 1, maxReplicas: 8, targetCPUUtilizationPercentage: 75 }, keda: { enabled: false } }
  embed: { queues: "embed", concurrency: 2, replicas: 1, hpa: { enabled: true, minReplicas: 1, maxReplicas: 4, targetCPUUtilizationPercentage: 80 } }

ingress:
  host: dev.data-platform.example.com
