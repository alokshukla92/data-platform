# Staging: production-like, KEDA queue-based worker autoscaling, blue/green for retrieval.
global:
  environment: staging
  imageTag: latest

defaults:
  replicas: 3
  hpa: { enabled: true, minReplicas: 3, maxReplicas: 12, targetCPUUtilizationPercentage: 70, targetMemoryUtilizationPercentage: 80 }
  pdb: { enabled: true, minAvailable: 2 }

services:
  retrieval:
    strategy: bluegreen   # validate the new version before cutting traffic over

workers:
  ingest: { queues: "ingest", concurrency: 4, replicas: 3, hpa: { enabled: true, minReplicas: 2, maxReplicas: 20, targetCPUUtilizationPercentage: 70 }, keda: { enabled: true, listName: "ingest", listLength: "20" } }
  embed: { queues: "embed", concurrency: 2, replicas: 2, hpa: { enabled: true, minReplicas: 1, maxReplicas: 10, targetCPUUtilizationPercentage: 75 }, keda: { enabled: true, listName: "embed", listLength: "10" } }

ingress:
  host: staging.data-platform.example.com
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
