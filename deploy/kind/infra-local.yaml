# Local-only stateful dependencies for the kind cluster.
#
# In dev/staging/production these are managed services (RDS/Aurora, ElastiCache,
# S3) and are intentionally NOT part of the application Helm chart. For a local
# kind demo we run lightweight single-replica Postgres (with pgvector) and Redis
# whose Service names + credentials match the chart's default secrets
# (postgres:5432 platform/changeme, redis-master:6379).
apiVersion: v1
kind: Namespace
metadata:
  name: data-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: data-platform
  labels: { app.kubernetes.io/name: postgres, app.kubernetes.io/part-of: data-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: postgres } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: postgres }
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          env:
            - { name: POSTGRES_USER, value: platform }
            - { name: POSTGRES_PASSWORD, value: changeme }
            - { name: POSTGRES_DB, value: platform }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - { name: pg, containerPort: 5432 }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "platform", "-d", "platform"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["pg_isready", "-U", "platform", "-d", "platform"] }
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: "1", memory: 512Mi }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - name: data
          emptyDir: {}   # ephemeral: fine for a local demo cluster
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: data-platform
  labels: { app.kubernetes.io/name: postgres, app.kubernetes.io/part-of: data-platform }
spec:
  selector: { app.kubernetes.io/name: postgres }
  ports:
    - { name: pg, port: 5432, targetPort: pg }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  namespace: data-platform
  labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: data-platform }
spec:
  replicas: 1
  selector: { matchLabels: { app.kubernetes.io/name: redis } }
  template:
    metadata:
      labels: { app.kubernetes.io/name: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: data-platform
  labels: { app.kubernetes.io/name: redis, app.kubernetes.io/part-of: data-platform }
spec:
  selector: { app.kubernetes.io/name: redis }
  ports:
    - { name: redis, port: 6379, targetPort: redis }
