receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  batch: { timeout: 5s, send_batch_size: 1024 }
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  debug: { verbosity: basic }
  # Prometheus scrapes the collector's own metrics endpoint.
  prometheus:
    endpoint: 0.0.0.0:8889
  # In dev we log traces; in real envs swap to otlp -> Tempo/Jaeger/Elastic APM.
  # otlp/elastic:
  #   endpoint: apm-server:8200

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
