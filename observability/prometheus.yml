global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8000"]
  - job_name: ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestion:8001"]
  - job_name: retrieval
    metrics_path: /metrics
    static_configs:
      - targets: ["retrieval:8002"]
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
